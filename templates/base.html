<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Smart Retail Analytics{% endblock %}</title>
  <meta name="description" content="Smart Retail Customer Analytics — segment insights, product recommendations, and revenue intelligence.">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <!-- Custom CSS -->
  <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
  {% block head_extra %}{% endblock %}
</head>
<body>

<!-- ═══════════════ TOP NAV ═══════════════ -->
<nav class="topnav">

  <!-- Brand -->
  <a href="{{ url_for('dashboard') }}" class="topnav-brand">
    <div class="topnav-logo">🛍️</div>
    <div>
      <div class="topnav-brand-text">Smart Retail</div>
      <div class="topnav-brand-sub">Analytics Platform</div>
    </div>
  </a>

  <!-- Nav Links -->
  <div class="topnav-links">
    <a href="{{ url_for('dashboard') }}"
       class="nav-link-item {% if active_page == 'dashboard' %}active{% endif %}" id="nav-dashboard">
      <i class="bi bi-speedometer2"></i>
      <span>Dashboard</span>
    </a>
    <a href="{{ url_for('insights') }}"
       class="nav-link-item {% if active_page == 'insights' %}active{% endif %}" id="nav-insights">
      <i class="bi bi-person-circle"></i>
      <span>Customer Lookup</span>
    </a>
    <a href="{{ url_for('recommendations') }}"
       class="nav-link-item {% if active_page == 'recommendations' %}active{% endif %}" id="nav-recs">
      <i class="bi bi-stars"></i>
      <span>Recommendations</span>
    </a>
    <a href="{{ url_for('nba_route') }}"
       class="nav-link-item {% if active_page == 'nba' %}active{% endif %}" id="nav-nba">
      <i class="bi bi-rocket-takeoff"></i>
      <span>Next Best Action</span>
    </a>
    <a href="{{ url_for('analytics') }}"
       class="nav-link-item {% if active_page == 'analytics' %}active{% endif %}" id="nav-analytics">
      <i class="bi bi-graph-up-arrow"></i>
      <span>Analytics</span>
    </a>
  </div>

  <!-- Right side -->
  <div class="topnav-right">
    <div class="nav-stat">
      <i class="bi bi-people-fill" style="color:#a5b4fc;"></i>
      <strong>{{ sb_total }}</strong> customers
    </div>
    <div class="nav-stat">
      <i class="bi bi-gem" style="color:#d8b4fe;"></i>
      <strong>{{ sb_vip }}</strong> VIP
    </div>
    <div class="nav-stat" style="border-color:rgba(239,68,68,.25);">
      <i class="bi bi-exclamation-triangle" style="color:#fca5a5;"></i>
      <strong>{{ sb_atrisk }}</strong> at risk
    </div>
    <div class="status-pill">
      <div class="status-dot"></div>
      Live
    </div>
  </div>

</nav>

<!-- ═══════════════ PAGE ═══════════════ -->
<div class="page-wrap">
  <div class="page-container">
    {% block content %}{% endblock %}
  </div>
</div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>

<script>
  /* Plotly chart renderer */
  function renderChart(id, jsonStr, opts) {
    if (!jsonStr || !id) return;
    const container = document.getElementById(id);
    if (!container) return;
    const fig = JSON.parse(jsonStr);
    const config = Object.assign({ responsive: true, displayModeBar: false }, opts || {});
    Plotly.newPlot(id, fig.data, fig.layout, config);
  }

  /* Stagger KPI card animations */
  document.querySelectorAll('.kpi-card').forEach((el, i) => {
    el.style.animationDelay = (i * 0.08) + 's';
  });
  document.querySelectorAll('.rec-card').forEach((el, i) => {
    el.style.animationDelay = (i * 0.04) + 's';
  });
  document.querySelectorAll('.stat-card').forEach((el, i) => {
    el.style.animationDelay = (i * 0.07) + 's';
  });
</script>

{% block page_scripts %}{% endblock %}

</body>
</html>
