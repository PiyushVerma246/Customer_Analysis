<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}RetailIQ Auth{% endblock %} — Customer Intelligence Platform</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
  <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet"/>
  <script>
    const savedTheme = localStorage.getItem('theme') || 'system';
    if (savedTheme === 'system') {
      const prefersLight = window.matchMedia('(prefers-color-scheme: light)').matches;
      document.documentElement.setAttribute('data-theme', prefersLight ? 'light' : 'dark');
    } else {
      document.documentElement.setAttribute('data-theme', savedTheme);
    }
  </script>
  <style>
    body {
      background-color: var(--bg-primary);
      color: var(--text-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      font-family: 'Inter', system-ui, sans-serif;
    }
    
    .auth-container {
      width: 100%;
      max-width: 420px;
      padding: 20px;
    }
    
    .brand-header {
      text-align: center;
      margin-bottom: 30px;
    }
    
    .brand-icon {
      width: 56px;
      height: 56px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--accent-purple), var(--accent-blue));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      color: white;
      margin: 0 auto 16px;
      box-shadow: 0 4px 12px rgba(139, 92, 246, 0.4);
    }
    
    .brand-title {
      font-size: 24px;
      font-weight: 700;
      color: #f8fafc;
      letter-spacing: -0.5px;
      margin-bottom: 4px;
    }
    
    .brand-subtitle {
      font-size: 14px;
      color: var(--text-muted);
    }

    .form-control {
      background-color: rgba(15, 23, 42, 0.6);
      border: 1px solid var(--border-color);
      color: var(--text-primary);
      padding: 12px 16px;
    }
    .form-control:focus {
      background-color: rgba(15, 23, 42, 0.8);
      border-color: var(--accent-purple);
      color: var(--text-primary);
      box-shadow: 0 0 0 0.25rem rgba(139, 92, 246, 0.25);
    }
    
    .auth-link {
      color: var(--accent-blue);
      text-decoration: none;
      font-size: 14px;
    }
    .auth-link:hover {
      text-decoration: underline;
      color: #60a5fa;
    }
  </style>
</head>
<body>

<div class="auth-container">
  <div class="brand-header">
    <div class="brand-icon"><i class="fa-solid fa-chart-line"></i></div>
    <div class="brand-title">RetailIQ</div>
    <div class="brand-subtitle">Customer Intelligence Platform</div>
  </div>
  
  {% block content %}{% endblock %}
</div>

</body>
</html>
