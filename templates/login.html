{% extends "auth.html" %}

{% block title %}Sign In{% endblock %}

{% block content %}
<div class="glass-card">
  <h4 class="mb-4 text-center">Sign In</h4>
  
  {% if error %}
  <div class="alert alert-danger" style="background:rgba(239, 68, 68, 0.1); border-color:rgba(239, 68, 68, 0.3); color:#fca5a5;">
    {{ error }}
  </div>
  {% endif %}

  <form method="POST" action="{{ url_for('login') }}">
    <div class="mb-3">
      <label for="username" class="form-label" style="font-size:14px; color:var(--text-muted)">Username</label>
      <input type="text" class="form-control" id="username" name="username" required autofocus>
    </div>
    
    <div class="mb-4">
      <label for="password" class="form-label" style="font-size:14px; color:var(--text-muted)">Password</label>
      <input type="password" class="form-control" id="password" name="password" required>
    </div>
    
    <button type="submit" class="btn btn-primary w-100 mb-3" style="border-radius:8px;">Sign In</button>
  </form>
  
  <div class="mb-4 text-center">
    <div style="font-size:12px; color:var(--text-muted); margin-bottom:8px; text-transform:uppercase; letter-spacing:1px;">Or</div>
    <button type="button" id="demoLoginBtn" class="btn btn-outline w-100" style="border-radius:8px; color:var(--accent-purple); border-color:rgba(139, 92, 246, 0.4);">
      <i class="fa-solid fa-wand-magic-sparkles me-2"></i> One-Click Demo Login
    </button>
  </div>
  
  <div class="text-center">
    <a href="{{ url_for('register') }}" class="auth-link">Create a new account</a>
  </div>
</div>

<script>
document.getElementById('demoLoginBtn').addEventListener('click', function() {
  document.getElementById('username').value = 'testuser';
  document.getElementById('password').value = 'testpass';
  document.getElementById('username').closest('form').submit();
});
</script>
{% endblock %}
